<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login | Bear Link</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script id="tailwind-config">
tailwind.config = {
    theme: {
        extend: {
            colors: {
                "surface":"#f7fafd","surface-container-low":"#f1f4f7","surface-container":"#ebeef1",
                "surface-container-lowest":"#ffffff","surface-container-high":"#e5e8eb",
                "surface-container-highest":"#e0e3e6","on-surface":"#181c1e","on-surface-variant":"#444651",
                "primary":"#001a48","primary-container":"#002d72","on-primary":"#ffffff","on-primary-container":"#7a97e2",
                "secondary":"#a04100","on-secondary":"#ffffff","outline-variant":"#c4c6d2","outline":"#747782",
                "error":"#ba1a1a","error-container":"#ffdad6"
            },
            fontFamily: { "headline":["Manrope"],"body":["Inter"] }
        }
    }
}
</script>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.hero-gradient { background: linear-gradient(135deg, #001a48 0%, #002d72 100%); }
</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center">

<div class="w-full max-w-md mx-auto px-6">
    <!-- Logo / brand -->
    <div class="text-center mb-10">
        <a href="index.html" class="inline-flex items-center gap-3 group">
            <div class="w-10 h-10 rounded-xl hero-gradient flex items-center justify-center shadow-lg">
                <span class="material-symbols-outlined text-white text-xl">link</span>
            </div>
            <span class="text-2xl font-extrabold tracking-tighter text-primary font-headline">Bear Link</span>
        </a>
        <p class="text-on-surface-variant text-sm mt-3">Administrator access only</p>
    </div>

    <!-- Card -->
    <div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_12px_32px_rgba(24,28,30,0.06)]">
        <h1 class="text-2xl font-extrabold font-headline text-primary mb-2">Welcome back</h1>
        <p class="text-on-surface-variant text-sm mb-8">Sign in to manage members, events, and points.</p>

        <!-- Error banner -->
        <div id="errorBanner" class="hidden mb-6 p-4 bg-error-container rounded-lg flex items-start gap-3">
            <span class="material-symbols-outlined text-error text-sm mt-0.5">error</span>
            <p id="errorMsg" class="text-sm text-error font-medium"></p>
        </div>

        <form id="loginForm" class="space-y-5" novalidate>
            <div>
                <label for="email" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required
                    placeholder="admin@bridgeland.fbla"
                    class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg text-sm focus:ring-2 focus:ring-primary/20 text-on-surface placeholder-outline/60"/>
            </div>
            <div>
                <label for="password" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Password</label>
                <div class="relative">
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        placeholder="••••••••"
                        class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg text-sm focus:ring-2 focus:ring-primary/20 text-on-surface pr-12"/>
                    <button type="button" id="togglePw" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-xl" id="pwIcon">visibility_off</span>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3.5 bg-primary text-on-primary font-bold rounded-lg hover:bg-primary-container transition-colors flex items-center justify-center gap-2 mt-2">
                <span id="btnLabel">Sign in</span>
                <span id="btnSpinner" class="hidden material-symbols-outlined text-sm animate-spin">progress_activity</span>
            </button>
        </form>
    </div>

    <div class="mt-6 text-center">
        <a href="index.html" class="text-sm text-on-surface-variant hover:text-secondary transition-colors flex items-center justify-center gap-1">
            <span class="material-symbols-outlined text-sm">arrow_back</span>Back to site
        </a>
    </div>
</div>

<script type="module">
import { signIn, isAdmin } from './js/auth.js'

// If already logged in as admin, go straight to dashboard
import { getSession } from './js/auth.js'
getSession().then(async session => {
    if (session) {
        const admin = await isAdmin()
        if (admin) window.location.href = 'admin.html'
    }
})

// Toggle password visibility
const pwInput = document.getElementById('password')
const pwIcon  = document.getElementById('pwIcon')
document.getElementById('togglePw').addEventListener('click', () => {
    const isHidden = pwInput.type === 'password'
    pwInput.type  = isHidden ? 'text' : 'password'
    pwIcon.textContent = isHidden ? 'visibility' : 'visibility_off'
})

// Form submit
document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault()
    const email    = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const banner   = document.getElementById('errorBanner')
    const errMsg   = document.getElementById('errorMsg')
    const btn      = document.getElementById('submitBtn')
    const label    = document.getElementById('btnLabel')
    const spinner  = document.getElementById('btnSpinner')

    // Loading state
    btn.disabled = true
    label.textContent = 'Signing in…'
    spinner.classList.remove('hidden')
    banner.classList.add('hidden')

    const { error } = await signIn(email, password)

    if (error) {
        banner.classList.remove('hidden')
        errMsg.textContent = error.message === 'Invalid login credentials'
            ? 'Incorrect email or password.'
            : error.message
        btn.disabled = false
        label.textContent = 'Sign in'
        spinner.classList.add('hidden')
        return
    }

    // Verify admin role before redirecting
    const admin = await isAdmin()
    if (!admin) {
        banner.classList.remove('hidden')
        errMsg.textContent = 'Your account does not have admin access.'
        btn.disabled = false
        label.textContent = 'Sign in'
        spinner.classList.add('hidden')
        // Sign them back out
        const { supabase } = await import('./js/supabase-client.js')
        await supabase.auth.signOut()
        return
    }

    window.location.href = 'admin.html'
})
</script>
</body>
</html>
